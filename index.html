    <script>
      (function() {
        var defaultTel = 'tel:+74996382751';
        var synced = false;
        function formatPhone(tel) {
          var digits = tel.replace('tel:+7', '');
          if (digits.length === 10) {
            return '+7 (' + digits.slice(0,3) + ') ' + digits.slice(3,6) + '-' + digits.slice(6,8) + '-' + digits.slice(8,10);
          }
          return tel.replace('tel:', '');
        }
        function applyMangoPhone() {
          if (synced) return;
          var links = Array.from(document.querySelectorAll('a[href^="tel:"]'));
          var mangoLink = links.find(function(el) { return el.getAttribute('href') !== defaultTel; });
          if (mangoLink) {
            synced = true;
            var mangoTel = mangoLink.getAttribute('href');
            var mangoDisplay = formatPhone(mangoTel);
            links.forEach(function(el) {
              el.setAttribute('href', mangoTel);
              var textNode = Array.from(el.childNodes).find(function(n) { return n.nodeType === 3 && n.textContent.trim(); });
              if (textNode) textNode.textContent = ' ' + mangoDisplay;
            });
          }
        }
        document.addEventListener('DOMContentLoaded', function() {
          var observer = new MutationObserver(applyMangoPhone);
          observer.observe(document.body, { subtree: true, attributes: true, attributeFilter: ['href'], childList: true });
          setTimeout(applyMangoPhone, 3000);
        });
      })();
    </script>
